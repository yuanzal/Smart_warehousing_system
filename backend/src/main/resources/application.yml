spring:
  application:
    name: smart_warehousing
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/db_build_safe?characterEncoding=utf8&useSSL=false&zeroDateTimeBehavior=convertToNull&tinyInt1isBit=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

mybatis-plus:
  type-aliases-package: com.qst.smart_warehousing.entity
  configuration:
    map-underscore-to-camel-case: true

device:
  tcp:
    port: 8888

camera:
  ai:
    baseUrl: http://localhost:5000/detect
  live:
    baseUrl: http://localhost:8068/hls/

tower:
  ai:
    baseUrl: http://localhost:5000/crane_safety

# ===== 日志配置（开启 DEBUG 定位 401） =====
logging:
  level:
    com.qst.smart_warehousing: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.authentication: DEBUG
    org.springframework.security.web: DEBUG

# ===== 视频推流配置 =====
video:
  ffmpeg-path: C:/ffmpeg/ffmpeg-8.1.2-essentials_build/bin/ffmpeg.exe
  rtmp-server: rtmp://localhost:1935/live/
  hls-base-url: http://localhost:8081/hls/
  hls-dir: C:/nginx-rtmp/html/hls/
  hls-fragment-seconds: 6